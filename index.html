<!DOCTYPE html>
<html>
<head>
<title>Digital Citizenship Game</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#1e90ff,#90ee90);
color:white;
text-align:center;
padding:40px;
}

.container{
background:white;
color:black;
padding:30px;
border-radius:10px;
max-width:800px;
margin:auto;
}

button{
background:#1e90ff;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0c6ed5;
}
</style>

</head>

<body>

<div class="container">

<h1>Digital Citizenship Interactive Game</h1>

<p>
Learn how to recognize phishing emails, protect your digital footprint,
and practice responsible internet use through real-world scenarios.
</p>

<br>

<input type="text" id="playerName" placeholder="Enter your name">

<br><br>

<button onclick="startGame()">Start Game</button>

</div>

<script>

function startGame(){

let name = document.getElementById("playerName").value;

if(name === ""){
alert("Please enter your name first.");
return;
}

alert("Welcome " + name + "! The game will begin.");

}

</script>

</body>
</html>
